name: Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install SSH keys
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.SSH_DEPLOY_KEY }}" > ~/.ssh/rsync_key
          echo "${{ secrets.SSH_INSTALL_KEY }}" > ~/.ssh/promote_key
          chmod 600 ~/.ssh/rsync_key ~/.ssh/promote_key
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Upload to staging
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/rsync_key -o StrictHostKeyChecking=yes" \
            dist/ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/colorconversion/

      - name: Promote to live
        run: |
          ssh -i ~/.ssh/promote_key \
              -o StrictHostKeyChecking=yes \
              ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}
